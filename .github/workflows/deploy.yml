# Build static export (out/) and deploy to Cloudflare Pages via Wrangler.
# Requires GitHub secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# See docs/DEPLOY.md → "GitHub Actions 部署"

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://aieditorrspediting.xyz
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-0NQNJQ2R84

      # npm run build already runs append-html-cache-headers.mjs — HTML gets
      # no-store at edge; /_next/* stays immutable. No CDN purge API needed.
      - name: Confirm HTML cache headers (prevents stale CSS after deploy)
        run: |
          echo "=== out/_headers (shipped with this deploy) ==="
          wc -l out/_headers
          echo "HTML routes with CDN-Cache-Control: no-store:"
          grep -c "CDN-Cache-Control: no-store" out/_headers || true
          echo "Sample:"
          head -20 out/_headers

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=aieditorrspediting --branch=main
