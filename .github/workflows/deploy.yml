# Build static export (out/) and deploy to Cloudflare Pages via Wrangler.
# Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Optional: CLOUDFLARE_ZONE_ID (for purge; auto-resolved if token has Zone Read)
# See docs/DEPLOY.md

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Cloudflare API token (Pages permission)
        run: |
          set -euo pipefail
          echo "Checking API token..."
          curl -fsS "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | jq .
          echo "Checking Pages API access for account ${CLOUDFLARE_ACCOUNT_ID}..."
          RESP=$(curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$RESP" | jq .
          if [ "$(echo "$RESP" | jq -r '.success')" != "true" ]; then
            echo "::error::Authentication failed for Pages API (code 10000). Recreate CLOUDFLARE_API_TOKEN with Account → Cloudflare Pages → Edit. Workers-only tokens do not work."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://aieditorrspediting.xyz
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-0NQNJQ2R84

      - name: Confirm HTML cache headers (prevents stale CSS after deploy)
        run: |
          echo "=== out/_headers (shipped with this deploy) ==="
          wc -l out/_headers
          echo "HTML routes with CDN-Cache-Control: no-store:"
          grep -c "CDN-Cache-Control: no-store" out/_headers || true
          head -20 out/_headers

      - name: Ensure Cloudflare Pages project exists
        run: |
          if npx wrangler pages project list 2>/dev/null | grep -qw "aieditorrspediting"; then
            echo "Pages project aieditorrspediting already exists"
          else
            echo "Creating Pages project aieditorrspediting..."
            npx wrangler pages project create aieditorrspediting --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=aieditorrspediting --branch=main

      - name: Purge Cloudflare CDN cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          ZONE_ID="${CLOUDFLARE_ZONE_ID:-}"
          if [ -z "$ZONE_ID" ]; then
            echo "Resolving zone ID for aieditorrspediting.xyz..."
            ZONE_ID=$(curl -fsS "https://api.cloudflare.com/client/v4/zones?name=aieditorrspediting.xyz&status=active" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" | jq -r '.result[0].id // empty')
          fi
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "::error::Purge failed: could not resolve zone ID. Add secret CLOUDFLARE_ZONE_ID or grant Zone Read on API token."
            exit 1
          fi
          echo "Purging all edge cache for zone ${ZONE_ID}..."
          RESULT=$(curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$RESULT" | jq .
          if [ "$(echo "$RESULT" | jq -r '.success')" != "true" ]; then
            echo "::error::Cloudflare purge_cache API returned success=false"
            exit 1
          fi
          echo "✅ Purge Everything completed"
